##############################################################################
# _deploy-s3-cloudfront.yml
# Reusable workflow — Build React (CRA) + Deploy S3 + Invalidação CloudFront
#
# Jobs:
#   1. build    → Checkout, Node 20, install, build (artefato)
#   2. deploy   → Download artefato, S3 sync, CloudFront invalidation
#   3. summary  → Resumo do deploy
#
# Multi-account:
#   Usa GitHub Environments para isolar secrets por conta AWS.
#   - sandbox:    conta 118690287580 (deploy livre)
#   - production: conta 385697366782 (com aprovação opcional)
#
# Actions: v5 (Node.js 24 runtime)
# Autor: Platform Team
# Versão: 3.0.0
##############################################################################

name: "Reusable — Deploy S3 + CloudFront"

on:
  workflow_call:
    inputs:
      # ── Identificação ──
      client_name:
        required: true
        type: string
        description: "Slug do cliente (ex: concorrencia)"
      environment:
        required: true
        type: string
        description: "GitHub Environment (sandbox ou production)"

      # ── AWS Resources ──
      s3_bucket:
        required: true
        type: string
        description: "Nome do bucket S3 de destino"
      cloudfront_distribution_id:
        required: true
        type: string
        description: "ID da distribuição CloudFront"
      aws_region:
        required: true
        type: string
        description: "Região AWS do bucket S3 (sa-east-1 ou us-east-1)"

      # ── Build Config ──
      node_version:
        required: false
        type: string
        default: "18"
      build_command:
        required: false
        type: string
        default: "yarn build"
      build_output:
        required: false
        type: string
        default: "build"

      # ── React Environment Variables ──
      react_app_api_url:
        required: true
        type: string
      react_app_front_app:
        required: true
        type: string
      react_app_title:
        required: true
        type: string
      react_app_description:
        required: true
        type: string
      react_app_sga_api_base_url:
        required: false
        type: string
        default: ""

      # ── Options ──
      skip_invalidation:
        required: false
        type: boolean
        default: false

jobs:
  # ════════════════════════════════════════════════════════════════
  # JOB 1: BUILD
  # Não precisa de credentials AWS — apenas código
  # ════════════════════════════════════════════════════════════════
  build:
    runs-on: ubuntu-latest
    name: "📦 Build — ${{ inputs.client_name }} [${{ inputs.environment }}]"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js ${{ inputs.node_version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node_version }}
          cache: "yarn"

      - name: Install dependencies
        run: yarn install

      - name: Build — ${{ inputs.client_name }}
        run: ${{ inputs.build_command }}
        env:
          CI: false
          NODE_ENV: production
          NODE_OPTIONS: "--openssl-legacy-provider"
          REACT_APP_API_URL: ${{ inputs.react_app_api_url }}
          REACT_APP_FRONT_APP: ${{ inputs.react_app_front_app }}
          REACT_APP_TITLE: ${{ inputs.react_app_title }}
          REACT_APP_DESCRIPTION: ${{ inputs.react_app_description }}
          REACT_APP_SGA_API_BASE_URL: ${{ inputs.react_app_sga_api_base_url }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: build-${{ inputs.client_name }}-${{ inputs.environment }}
          path: ${{ inputs.build_output }}/
          retention-days: 1
          if-no-files-found: error

  # ════════════════════════════════════════════════════════════════
  # JOB 2: DEPLOY
  # Usa GitHub Environment para pegar secrets da conta correta
  # Se production tiver "required reviewers", aguarda aprovação aqui
  # ════════════════════════════════════════════════════════════════
  deploy:
    needs: build
    runs-on: ubuntu-latest
    name: "🚀 Deploy — ${{ inputs.client_name }} [${{ inputs.environment }}]"
    environment: ${{ inputs.environment }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v5
        with:
          name: build-${{ inputs.client_name }}-${{ inputs.environment }}
          path: ${{ inputs.build_output }}/

      - name: Configure AWS Credentials — ${{ inputs.environment }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: Verify AWS Account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "🔐 Deploying to AWS Account: $ACCOUNT_ID"
          echo "📍 Environment: ${{ inputs.environment }}"
          echo "account_id=$ACCOUNT_ID" >> $GITHUB_OUTPUT

      - name: "S3 Sync — Assets (cache imutável 1 ano)"
        run: |
          echo "📦 Uploading assets → s3://${{ inputs.s3_bucket }}/"
          aws s3 sync ${{ inputs.build_output }}/ s3://${{ inputs.s3_bucket }}/ \
            --delete \
            --exact-timestamps \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "*.json" \
            --exclude "service-worker.js"

      - name: "S3 Sync — HTML/JSON (sem cache)"
        run: |
          echo "📄 Uploading HTML/JSON → s3://${{ inputs.s3_bucket }}/"
          aws s3 sync ${{ inputs.build_output }}/ s3://${{ inputs.s3_bucket }}/ \
            --exact-timestamps \
            --cache-control "public, max-age=0, must-revalidate" \
            --exclude "*" \
            --include "*.html" \
            --include "*.json" \
            --include "service-worker.js"

      - name: Invalidate CloudFront
        if: ${{ inputs.skip_invalidation == false }}
        run: |
          echo "🔄 Invalidando CloudFront ${{ inputs.cloudfront_distribution_id }}..."
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ inputs.cloudfront_distribution_id }} \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)

          echo "⏳ Aguardando invalidação $INVALIDATION_ID..."
          aws cloudfront wait invalidation-completed \
            --distribution-id ${{ inputs.cloudfront_distribution_id }} \
            --id $INVALIDATION_ID
          echo "✅ Cache invalidado com sucesso"

  # ════════════════════════════════════════════════════════════════
  # JOB 3: SUMMARY
  # ════════════════════════════════════════════════════════════════
  summary:
    needs: [build, deploy]
    if: always()
    runs-on: ubuntu-latest
    name: "📊 Summary"
    steps:
      - name: Deployment Summary
        run: |
          BUILD_STATUS="${{ needs.build.result }}"
          DEPLOY_STATUS="${{ needs.deploy.result }}"

          [ "$DEPLOY_STATUS" = "success" ] && ICON="✅" || ICON="❌"

          echo "## $ICON Deploy — ${{ inputs.client_name }} [${{ inputs.environment }}]" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Etapa | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Build** | \`$BUILD_STATUS\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Deploy** | \`$DEPLOY_STATUS\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Cliente** | \`${{ inputs.client_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Ambiente** | \`${{ inputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Bucket S3** | \`${{ inputs.s3_bucket }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **CloudFront** | \`${{ inputs.cloudfront_distribution_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Região** | \`${{ inputs.aws_region }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${GITHUB_SHA::8}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **API URL** | \`${{ inputs.react_app_api_url }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Trigger** | \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
