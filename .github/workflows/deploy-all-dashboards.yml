name: "Deploy ALL Dashboards — Production"

# ══════════════════════════════════════════════════════════════════
# Push em main → deploy de TODOS os clientes em PRODUCTION
# Sandbox tem workflow próprio (deploy-dashboard-sandbox.yml)
# ══════════════════════════════════════════════════════════════════

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"

  workflow_dispatch:

jobs:
  concorrencia:
    uses: ./.github/workflows/deploy-dashboard-concorrencia.yml
    secrets: inherit

  concorrencia-mt:
    uses: ./.github/workflows/deploy-dashboard-concorrencia-mt.yml
    secrets: inherit
