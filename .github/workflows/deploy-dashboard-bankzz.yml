name: "Deploy Dashboard — Bankzz"

on:
  push:
    branches:
      - "release/dashboard-bankzz"
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/_deploy-s3-cloudfront.yml
    with:
      client_name: "bankzz"
      s3_bucket: "dashboard-banco-bankzz"
      cloudfront_distribution_id: "E1XU4LSM7OYXNT"
      aws_region: "sa-east-1"
      react_app_api_url: "https://api.bankzz.com.br/api"
      react_app_front_app: "bankzz"
      react_app_title: "Bankzz"
      react_app_description: "BANKZZ - Dashboard do Banco Bankzz"
    secrets: inherit
