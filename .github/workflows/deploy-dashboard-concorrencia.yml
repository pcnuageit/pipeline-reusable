name: "Deploy Dashboard — Concorrência"

on:
  push:
    branches:
      - "release/dashboard-concorrencia"
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente de deploy"
        required: true
        type: choice
        options:
          - sandbox
          - production
        default: sandbox

jobs:
  # ── SANDBOX ──
  # Push em branch → deploy automático no sandbox
  # workflow_dispatch com environment=sandbox → deploy manual
  sandbox:
    if: >
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'sandbox')
    uses: ./.github/workflows/_deploy-s3-cloudfront.yml
    with:
      client_name: "concorrencia"
      environment: "sandbox"
      s3_bucket: "dashboard-gf-concorrencia-sbx-118690287580"
      cloudfront_distribution_id: "EXXXXXXXXXXXXX"
      aws_region: "sa-east-1"
      react_app_api_url: "https://SANDBOX_CF_DOMAIN.cloudfront.net/api"
      react_app_front_app: "concorrencia"
      react_app_title: "Concorrencia"
      react_app_description: "Concorrencia - Dashboard [SANDBOX]"
    secrets: inherit

  # ── PRODUCTION ──
  # Apenas via workflow_dispatch com environment=production
  # Se o GitHub Environment "production" tiver required reviewers,
  # o deploy aguarda aprovação antes de executar
  production:
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'production'
    uses: ./.github/workflows/_deploy-s3-cloudfront.yml
    with:
      client_name: "concorrencia"
      environment: "production"
      s3_bucket: "dashboard-gf-concorrencia-prod-385697366782"
      cloudfront_distribution_id: "E2EPGFGK32LGEA"
      aws_region: "sa-east-1"
      react_app_api_url: "https://drpzon9lew0kt.cloudfront.net/api"
      react_app_front_app: "concorrencia"
      react_app_title: "Concorrencia"
      react_app_description: "Concorrencia - Dashboard do Banco Concorrencia"
    secrets: inherit
