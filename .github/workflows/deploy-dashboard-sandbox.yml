name: "Deploy Dashboard — Sandbox"

on:
  push:
    branches:
      - sandbox
    paths-ignore:
      - "**.md"

  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/_deploy-s3-cloudfront.yml
    with:
      client_name: "sandbox"
      environment: "sandbox"
      s3_bucket: "dashboard-tst-sandbox-sbx-118690287580"
      cloudfront_distribution_id: "E2IDJNTQ3LGD6N"
      aws_region: "sa-east-1"
      react_app_api_url: "https://d6raioji4vggb.cloudfront.net/api"
      react_app_front_app: "sandbox"
      react_app_title: "Sandbox"
      react_app_description: "Sandbox - Dashboard do Banco concorrencia"
      react_app_sga_api_base_url: "https://sandbox.sga.integrapay.com.br/api"
    secrets: inherit
